name: Run Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v5

      - name: Sæt Python 3.14 op
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Installer dependencies
        run: pip install -r requirements.txt

      - name: Hent tidligere Allure historik artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-results
          path: allure-history
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.before }}

      - name: Kopiér Allure historik
        run: |
          if [ -d "allure-history/history" ]; then
            mkdir -p reports/allure-results/history
            cp -r allure-history/history/. reports/allure-results/history/
          fi

      - name: Kør pytest med Allure
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: pytest --alluredir=reports/allure-results

      - name: Gem Allure resultater som artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results
          path: reports/allure-results/
