<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #22c55e;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .header-title { text-align: left; flex: 1; }

    .header-title h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .header-title p {
      color: var(--text-muted);
      margin-top: 0.3rem;
      font-size: 0.9rem;
    }

    .btn-logout {
      background: transparent;
      color: var(--text-muted);
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
      flex-shrink: 0;
    }

    .btn-logout:hover {
      color: var(--danger);
      border-color: #fecaca;
      background: #fef2f2;
    }

    /* Error banner */
    #error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: var(--radius);
      padding: 0.9rem 1.2rem;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    #error-banner.hidden { display: none; }
    #error-banner svg { flex-shrink: 0; }

    /* Add todo form */
    .add-form {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.4rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 0.75rem;
    }

    .add-form input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      padding: 0.65rem 1rem;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color var(--transition);
    }

    .add-form input:focus { border-color: var(--primary); }
    .add-form input::placeholder { color: var(--text-muted); }

    button {
      cursor: pointer;
      border: none;
      border-radius: 7px;
      padding: 0.65rem 1.1rem;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background var(--transition), opacity var(--transition);
    }

    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      padding: 0.4rem 0.6rem;
      font-size: 0.82rem;
      border: 1.5px solid #fecaca;
    }

    .btn-danger:hover:not(:disabled) { background: #fef2f2; }

    .btn-edit {
      background: transparent;
      color: var(--primary);
      padding: 0.4rem 0.6rem;
      font-size: 0.82rem;
      border: 1.5px solid #c7d2fe;
    }

    .btn-edit:hover:not(:disabled) { background: #eef2ff; }

    /* Spinner */
    .spinner-wrap {
      display: flex;
      justify-content: center;
      padding: 3rem 0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Todo list */
    #todo-list { display: flex; flex-direction: column; gap: 0.65rem; }

    .todo-item {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
      transition: opacity var(--transition);
    }

    .todo-item.completed .todo-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .todo-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: var(--success);
      flex-shrink: 0;
    }

    .todo-title { flex: 1; font-size: 0.95rem; word-break: break-word; }

    .todo-edit-input {
      flex: 1;
      border: 1.5px solid var(--primary);
      border-radius: 6px;
      padding: 0.35rem 0.7rem;
      font-size: 0.95rem;
      outline: none;
    }

    .todo-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

    /* Empty state */
    .empty { text-align: center; padding: 3rem 0; color: var(--text-muted); }
    .empty svg { margin-bottom: 0.8rem; opacity: 0.35; }

    /* Stats bar */
    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 0.9rem;
      padding: 0 0.2rem;
    }

    @media (max-width: 480px) {
      .header-title h1 { font-size: 1.5rem; }
      .add-form { flex-direction: column; }
      .add-form button { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-title">
        <h1>Todo App</h1>
        <p>Organisér din dag effektivt</p>
      </div>
      <button class="btn-logout" id="logout-btn" data-cy="logout-btn">Log ud</button>
    </header>

    <div id="error-banner" class="hidden">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="error-msg">API er utilgængeligt. Prøv igen senere.</span>
    </div>

    <form class="add-form" id="add-form">
      <input
        type="text"
        id="new-title"
        data-cy="todo-input"
        placeholder="Hvad skal du lave?"
        maxlength="500"
        autocomplete="off"
        required
      />
      <button type="submit" class="btn-primary" id="add-btn" data-cy="todo-submit">Tilføj</button>
    </form>

    <div class="stats" id="stats" style="display:none">
      <span id="stats-total"></span>
      <span id="stats-done"></span>
    </div>

    <div id="list-container">
      <div class="spinner-wrap" id="spinner">
        <div class="spinner"></div>
      </div>
      <div id="todo-list"></div>
    </div>
  </div>

  <script>
    const API = 'https://pythonayd-todo-api.onrender.com';

    /* ── Auth guard ── */
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = 'login.html';
    }

    const spinner       = document.getElementById('spinner');
    const todoList      = document.getElementById('todo-list');
    const addForm       = document.getElementById('add-form');
    const newTitleInput = document.getElementById('new-title');
    const addBtn        = document.getElementById('add-btn');
    const errorBanner   = document.getElementById('error-banner');
    const errorMsg      = document.getElementById('error-msg');
    const statsEl       = document.getElementById('stats');
    const statsTotalEl  = document.getElementById('stats-total');
    const statsDoneEl   = document.getElementById('stats-done');
    const logoutBtn     = document.getElementById('logout-btn');

    /* ── Logout ── */
    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    });

    /* ── Helpers ── */
    function showError(msg) {
      errorMsg.textContent = msg;
      errorBanner.classList.remove('hidden');
    }

    function hideError() {
      errorBanner.classList.add('hidden');
    }

    function setLoading(on) {
      spinner.style.display = on ? 'flex' : 'none';
    }

    function updateStats(todos) {
      if (!todos.length) { statsEl.style.display = 'none'; return; }
      const done = todos.filter(t => t.completed).length;
      statsEl.style.display = 'flex';
      statsTotalEl.textContent = `${todos.length} todo${todos.length !== 1 ? 's' : ''}`;
      statsDoneEl.textContent  = `${done} afsluttet`;
    }

    /* ── API calls ── */
    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API}${path}`, {
        mode: 'cors',
        credentials: 'omit',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${localStorage.getItem('token')}`,
        },
        ...options,
      });

      // Token udløbet eller ugyldigt
      if (res.status === 401) {
        localStorage.removeItem('token');
        window.location.href = 'login.html';
        return;
      }

      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || `HTTP ${res.status}`);
      }

      if (res.status === 204) return null;
      return res.json();
    }

    async function fetchTodos() {
      setLoading(true);
      hideError();
      try {
        const todos = await apiFetch('/todos');
        renderTodos(todos);
        updateStats(todos);
      } catch (e) {
        showError('Kunne ikke hente todos – API\'et er muligvis nede. ' + e.message);
        todoList.innerHTML = '';
        statsEl.style.display = 'none';
      } finally {
        setLoading(false);
      }
    }

    async function createTodo(title) {
      return apiFetch('/todos', {
        method: 'POST',
        body: JSON.stringify({ title, completed: false }),
      });
    }

    async function updateTodo(id, data) {
      return apiFetch(`/todos/${id}`, {
        method: 'PUT',
        body: JSON.stringify(data),
      });
    }

    async function deleteTodo(id) {
      return apiFetch(`/todos/${id}`, { method: 'DELETE' });
    }

    /* ── Render ── */
    function renderTodos(todos) {
      if (!todos.length) {
        todoList.innerHTML = `
          <div class="empty">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <p>Ingen todos endnu.<br>Tilføj en ovenfor!</p>
          </div>`;
        return;
      }
      todoList.innerHTML = '';
      todos.forEach(todo => todoList.appendChild(createTodoEl(todo)));
    }

    function createTodoEl(todo) {
      const item = document.createElement('div');
      item.className = `todo-item${todo.completed ? ' completed' : ''}`;
      item.dataset.id = todo.id;
      item.dataset.cy = 'todo-item';

      item.innerHTML = `
        <input class="todo-checkbox" type="checkbox" title="Marker som ${todo.completed ? 'ikke ' : ''}afsluttet" ${todo.completed ? 'checked' : ''} />
        <span class="todo-title">${escapeHtml(todo.title)}</span>
        <div class="todo-actions">
          <button class="btn-edit" data-cy="todo-edit" title="Rediger">Rediger</button>
          <button class="btn-danger" data-cy="todo-delete" title="Slet">Slet</button>
        </div>`;

      item.querySelector('.todo-checkbox').addEventListener('change', () => toggleTodo(todo, item, item.querySelector('.todo-checkbox')));
      item.querySelector('.btn-edit').addEventListener('click', () => startEdit(todo, item));
      item.querySelector('.btn-danger').addEventListener('click', () => removeTodo(todo.id, item));

      return item;
    }

    /* ── Actions ── */
    async function toggleTodo(todo, item, checkbox) {
      checkbox.disabled = true;
      hideError();
      try {
        const updated = await updateTodo(todo.id, { title: todo.title, completed: !todo.completed });
        todo.completed = updated.completed;
        item.classList.toggle('completed', updated.completed);
        checkbox.checked = updated.completed;
        checkbox.title = `Marker som ${updated.completed ? 'ikke ' : ''}afsluttet`;
        refreshStats();
      } catch (e) {
        showError('Kunne ikke opdatere todo: ' + e.message);
        checkbox.checked = todo.completed;
      } finally {
        checkbox.disabled = false;
      }
    }

    function startEdit(todo, item) {
      const titleSpan = item.querySelector('.todo-title');
      const actions   = item.querySelector('.todo-actions');

      const input = document.createElement('input');
      input.className = 'todo-edit-input';
      input.dataset.cy = 'todo-edit-input';
      input.value = todo.title;

      const saveBtn   = document.createElement('button');
      saveBtn.className = 'btn-primary';
      saveBtn.dataset.cy = 'todo-save';
      saveBtn.textContent = 'Gem';
      saveBtn.style.cssText = 'padding:0.4rem 0.7rem;font-size:0.82rem';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn-edit';
      cancelBtn.textContent = 'Annuller';

      titleSpan.replaceWith(input);
      actions.innerHTML = '';
      actions.appendChild(saveBtn);
      actions.appendChild(cancelBtn);

      input.focus();
      input.select();

      saveBtn.addEventListener('click', () => saveEdit(todo, item, input));
      cancelBtn.addEventListener('click', () => fetchTodos());
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveEdit(todo, item, input);
        if (e.key === 'Escape') fetchTodos();
      });
    }

    async function saveEdit(todo, item, input) {
      const newTitle = input.value.trim();
      if (!newTitle) { showError('Titlen må ikke være tom.'); return; }
      hideError();
      input.disabled = true;
      try {
        const updated = await updateTodo(todo.id, { title: newTitle, completed: todo.completed });
        todo.title = updated.title;
        await fetchTodos();
      } catch (e) {
        showError('Kunne ikke gemme ændring: ' + e.message);
        input.disabled = false;
      }
    }

    async function removeTodo(id, item) {
      hideError();
      item.style.opacity = '0.4';
      const deleteBtn = item.querySelector('.btn-danger');
      if (deleteBtn) deleteBtn.disabled = true;
      try {
        await deleteTodo(id);
        item.remove();
        refreshStats();
        if (!todoList.querySelector('.todo-item')) {
          renderTodos([]);
          statsEl.style.display = 'none';
        }
      } catch (e) {
        showError('Kunne ikke slette todo: ' + e.message);
        item.style.opacity = '1';
        if (deleteBtn) deleteBtn.disabled = false;
      }
    }

    function refreshStats() {
      const items = [...todoList.querySelectorAll('.todo-item')];
      const total = items.length;
      const done  = items.filter(i => i.classList.contains('completed')).length;
      if (!total) { statsEl.style.display = 'none'; return; }
      statsEl.style.display = 'flex';
      statsTotalEl.textContent = `${total} todo${total !== 1 ? 's' : ''}`;
      statsDoneEl.textContent  = `${done} afsluttet`;
    }

    /* ── Add form ── */
    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = newTitleInput.value.trim();
      if (!title) return;
      hideError();
      addBtn.disabled = true;
      addBtn.textContent = 'Tilføjer...';
      try {
        await createTodo(title);
        newTitleInput.value = '';
        await fetchTodos();
      } catch (e) {
        showError('Kunne ikke oprette todo: ' + e.message);
      } finally {
        addBtn.disabled = false;
        addBtn.textContent = 'Tilføj';
        newTitleInput.focus();
      }
    });

    /* ── Utils ── */
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    /* ── Init ── */
    fetchTodos();
  </script>
</body>
</html>
