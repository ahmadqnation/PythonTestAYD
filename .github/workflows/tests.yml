name: Run Tests

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v5

      - name: Sæt Python 3.14 op
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Installer dependencies
        run: pip install -r requirements.txt

      - name: Hent tidligere Allure historik artifact
        uses: dawidd6/action-download-artifact@v9
        continue-on-error: true
        with:
          name: allure-results
          path: allure-history
          workflow: tests.yml
          if_no_artifact_found: warn

      - name: Kopiér Allure historik
        run: |
          if [ -d "allure-history/history" ]; then
            mkdir -p reports/allure-results/history
            cp -r allure-history/history/. reports/allure-results/history/
          fi

      - name: Kør pytest med Allure
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pytest --alluredir=reports/allure-results

      - name: Gem Allure resultater som artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results
          path: reports/allure-results/

  deploy:
    needs: test
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download allure-results artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Installer Java (kræves af Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer Allure CLI
        run: |
          curl -sLo allure.tgz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          sudo tar -zxf allure.tgz -C /opt/
          sudo ln -sf /opt/allure-2.27.0/bin/allure /usr/local/bin/allure

      - name: Hent Allure historik fra GitHub Pages
        continue-on-error: true
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          if curl -sf "${PAGES_URL}/history/history.json" -o /dev/null; then
            mkdir -p allure-results/history
            for file in history.json history-trend.json categories-trend.json duration-trend.json retry-trend.json; do
              curl -sf "${PAGES_URL}/history/${file}" -o "allure-results/history/${file}" || true
            done
          fi

      - name: Generer Allure rapport
        run: allure generate allure-results --clean -o allure-report

      - name: Konfigurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload rapport til Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy til GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
